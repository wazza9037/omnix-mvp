<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OMNIX — Universal Robotics Control</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root {
      --navy: #0D1B2A;
      --deep-blue: #1B2838;
      --teal: #00B4D8;
      --light-teal: #90E0EF;
      --bg: #0a1120;
      --card-bg: #111b2e;
      --card-border: #1e2d45;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ========== LAYOUT ========== */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr 340px;
      grid-template-rows: 52px 36px 44px 36px 1fr;
      grid-template-areas:
        "header header header"
        "side   tabs   rpanel"
        "side   cmdbar rpanel"
        "side   views  rpanel"
        "side   viewer rpanel";
      height: 100vh;
    }

    .header {
      grid-area: header;
      background: var(--navy);
      border-bottom: 1px solid var(--card-border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--teal), #90E0EF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .sidebar {
      grid-area: side;
      background: var(--navy);
      border-right: 1px solid var(--card-border);
      overflow-y: auto;
      padding: 10px;
    }

    .sb-section-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 6px 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sb-action {
      background: var(--teal);
      color: #000;
      border: none;
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.15s;
    }

    .sb-action:hover {
      opacity: 0.85;
    }

    .device-row {
      background: var(--card-bg);
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .device-row:hover {
      border-color: var(--card-border);
      background: rgba(255, 255, 255, 0.02);
    }

    .device-row.active {
      border-color: var(--teal);
      background: rgba(0, 180, 216, 0.08);
    }

    .device-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      background: rgba(0, 180, 216, 0.1);
    }

    .device-body {
      flex: 1;
      min-width: 0;
    }

    .device-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .device-type {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .device-status {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: var(--success);
      margin-top: 2px;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.5s infinite;
    }

    .status-dot.offline {
      background: var(--danger);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ========== TABS ========== */
    .workspace-tabs {
      grid-area: tabs;
      background: var(--navy);
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 4px;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .tab {
      background: var(--card-bg);
      border: 1px solid transparent;
      border-radius: 6px 6px 0 0;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      min-width: 100px;
    }

    .tab:hover {
      color: var(--text);
      border-color: var(--card-border);
    }

    .tab.active {
      background: var(--card-bg);
      color: var(--teal);
      border-color: var(--teal);
      border-bottom-color: var(--card-bg);
    }

    .tab-close {
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 10px;
      color: inherit;
      opacity: 0.6;
      transition: opacity 0.15s;
    }

    .tab:hover .tab-close {
      opacity: 1;
    }

    /* ========== COMMAND BAR ========== */
    .cmdbar {
      grid-area: cmdbar;
      background: var(--navy);
      border-bottom: 1px solid var(--card-border);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nlp-input {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--text);
      transition: border-color 0.15s;
    }

    .nlp-input:focus {
      outline: none;
      border-color: var(--teal);
    }

    .nlp-input::placeholder {
      color: var(--text-muted);
    }

    .nlp-button {
      background: var(--teal);
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .nlp-button:hover {
      opacity: 0.85;
    }

    /* ========== VIEW SWITCHER ========== */
    .view-switcher {
      grid-area: views;
      background: var(--navy);
      border-bottom: 1px solid var(--card-border);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .view-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .view-btn:hover {
      color: var(--text);
      border-color: var(--teal);
    }

    .view-btn.active {
      background: var(--teal);
      color: #000;
      border-color: var(--teal);
    }

    /* ========== VIEWER ========== */
    .viewer {
      grid-area: viewer;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    #canvas3d {
      display: block;
      width: 100%;
      height: 100%;
    }

    .viewer-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
    }

    .viewer-overlay.active {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 180, 216, 0.2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* NLP Plan Display */
    .nlp-plan {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px;
      max-width: 300px;
      display: none;
    }

    .nlp-plan.active {
      display: block;
    }

    .plan-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--teal);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .plan-step {
      font-size: 10px;
      padding: 4px 0;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .plan-step.current {
      color: var(--teal);
      font-weight: 600;
    }

    .plan-chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 9px;
      background: rgba(0, 180, 216, 0.15);
      color: var(--teal);
      margin-right: 4px;
    }

    .plan-chip.done {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
    }

    .plan-chip.pending {
      background: rgba(148, 163, 184, 0.15);
      color: var(--text-muted);
    }

    .plan-execute {
      margin-top: 8px;
      background: var(--success);
      color: #000;
      border: none;
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }

    .plan-execute:hover {
      opacity: 0.85;
    }

    /* ========== RIGHT PANEL ========== */
    .rpanel {
      grid-area: rpanel;
      background: var(--navy);
      border-left: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 12px;
    }

    .rpanel-section {
      margin-bottom: 16px;
    }

    .rpanel-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .telemetry-item {
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .telemetry-label {
      color: var(--text-muted);
    }

    .telemetry-value {
      color: var(--text);
      font-weight: 600;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 10px;
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }

    .control-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 8px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .control-btn:hover {
      background: var(--deep-blue);
      border-color: var(--teal);
      color: var(--teal);
    }

    .control-btn.danger {
      color: var(--danger);
    }

    .control-btn.danger:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: var(--danger);
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      margin-top: 8px;
    }

    .color-btn {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .color-btn:hover, .color-btn.active {
      border-color: var(--text);
    }

    .brightness-controls {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .brightness-btn {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 6px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    .brightness-btn:hover {
      background: var(--deep-blue);
      border-color: var(--teal);
      color: var(--teal);
    }

    /* ========== MODAL ========== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 0;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      background: var(--navy);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text);
      transition: border-color 0.15s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--teal);
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .template-card {
      background: var(--navy);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .template-card:hover {
      border-color: var(--teal);
      background: rgba(0, 180, 216, 0.05);
    }

    .template-icon {
      font-size: 28px;
      text-align: center;
    }

    .template-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .template-desc {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ========== TOAST ========== */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 2000;
    }

    .toast {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: var(--text);
      max-width: 300px;
      animation: slideIn 0.3s ease;
    }

    .toast.success {
      border-left: 3px solid var(--success);
    }

    .toast.error {
      border-left: 3px solid var(--danger);
    }

    .toast.info {
      border-left: 3px solid var(--teal);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* ========== SCROLLBAR ========== */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 180, 216, 0.3);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 180, 216, 0.5);
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div>
        <div class="logo">OMNIX</div>
        <div class="logo-sub">UNIVERSAL ROBOTICS</div>
      </div>
    </div>
  </div>

  <!-- Sidebar: Device List -->
  <div class="sidebar" id="sidebar">
    <div class="sb-section-header">
      DEVICES
      <button class="sb-action" id="addDeviceBtn">+ ADD</button>
    </div>
    <div id="deviceList"></div>
  </div>

  <!-- Tabs -->
  <div class="workspace-tabs" id="tabBar"></div>

  <!-- Command Bar -->
  <div class="cmdbar">
    <input type="text" class="nlp-input" id="nlpInput" placeholder="Type a command... (e.g., 'take off to 5 meters')">
    <button class="nlp-button" id="nlpSubmit">Execute</button>
  </div>

  <!-- View Switcher -->
  <div class="view-switcher">
    <button class="view-btn active" data-view="overview" id="overviewBtn">Overview</button>
    <button class="view-btn" data-view="control" id="controlBtn">Control</button>
  </div>

  <!-- 3D Viewer -->
  <div class="viewer">
    <canvas id="canvas3d"></canvas>
    <div class="viewer-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="nlp-plan" id="nlpPlan"></div>
  </div>

  <!-- Right Panel: Telemetry & Controls -->
  <div class="rpanel" id="rpanel"></div>
</div>

<!-- Add Device Modal -->
<div class="modal-overlay" id="addDeviceModal">
  <div class="modal">
    <div class="modal-header">
      Add Device
      <button class="modal-close" id="closeAddModal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Device Name</label>
        <input type="text" class="form-input" id="deviceNameInput" placeholder="My Drone">
      </div>
      <div class="form-group">
        <label class="form-label">Device Type</label>
        <select class="form-input" id="deviceTypeSelect">
          <option value="">-- Select Type --</option>
          <option value="drone">Drone</option>
          <option value="robot_arm">Robot Arm</option>
          <option value="smart_light">Smart Light</option>
        </select>
      </div>
      <button class="nlp-button" id="createDeviceBtn" style="width: 100%; margin-top: 12px;">Create Device</button>
    </div>
  </div>
</div>

<!-- Robot Library Modal (accessed with 'N' key) -->
<div class="modal-overlay" id="libraryModal">
  <div class="modal" style="max-width: 700px;">
    <div class="modal-header">
      Robot Library
      <button class="modal-close" id="closeLibraryModal">&times;</button>
    </div>
    <div class="modal-body">
      <div id="templateGrid" class="template-grid"></div>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ========== CONFIG ==========
const API_BASE = '';  // Same origin — works on any port
const TELEMETRY_POLL_INTERVAL = 600;

// ========== STATE ==========
const state = {
  devices: {},
  selectedDeviceId: null,
  currentView: 'overview',
  currentPlan: null,
  executingPlanStepIndex: 0,
  templates: [],
  lastTelemetry: {},
};

// ========== THREE.JS SETUP ==========
let scene, camera, renderer, deviceModels = {};

// Simple orbit controls (OrbitControls is not in r128 CDN)
let orbitState = { isDragging: false, prevX: 0, prevY: 0, azimuth: 45, elevation: 30, distance: 12 };

function updateOrbitCamera() {
  const az = orbitState.azimuth * Math.PI / 180;
  const el = orbitState.elevation * Math.PI / 180;
  camera.position.x = orbitState.distance * Math.cos(el) * Math.sin(az);
  camera.position.y = orbitState.distance * Math.sin(el);
  camera.position.z = orbitState.distance * Math.cos(el) * Math.cos(az);
  camera.lookAt(0, 2, 0);
}

function initThreeJS() {
  const canvas = document.getElementById('canvas3d');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a1120);
  scene.fog = new THREE.Fog(0x0a1120, 40, 100);

  camera = new THREE.PerspectiveCamera(55, canvas.clientWidth / canvas.clientHeight, 0.1, 500);
  updateOrbitCamera();

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(canvas.clientWidth, canvas.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;

  // Mouse orbit controls
  canvas.addEventListener('mousedown', e => {
    orbitState.isDragging = true;
    orbitState.prevX = e.clientX;
    orbitState.prevY = e.clientY;
    canvas.style.cursor = 'grabbing';
  });
  canvas.addEventListener('mousemove', e => {
    if (!orbitState.isDragging) return;
    orbitState.azimuth += (e.clientX - orbitState.prevX) * 0.4;
    orbitState.elevation = Math.max(5, Math.min(85, orbitState.elevation + (orbitState.prevY - e.clientY) * 0.3));
    orbitState.prevX = e.clientX;
    orbitState.prevY = e.clientY;
    updateOrbitCamera();
  });
  canvas.addEventListener('mouseup', () => { orbitState.isDragging = false; canvas.style.cursor = 'grab'; });
  canvas.addEventListener('mouseleave', () => { orbitState.isDragging = false; canvas.style.cursor = 'grab'; });
  canvas.addEventListener('wheel', e => {
    orbitState.distance = Math.max(3, Math.min(60, orbitState.distance + e.deltaY * 0.02));
    updateOrbitCamera();
    e.preventDefault();
  }, { passive: false });
  canvas.style.cursor = 'grab';

  // Lights
  const ambientLight = new THREE.AmbientLight(0x667788, 0.7);
  scene.add(ambientLight);

  const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
  keyLight.position.set(15, 20, 10);
  keyLight.castShadow = true;
  scene.add(keyLight);

  const fillLight = new THREE.DirectionalLight(0x4488bb, 0.3);
  fillLight.position.set(-10, 10, -10);
  scene.add(fillLight);

  const hemiLight = new THREE.HemisphereLight(0x88aacc, 0x223344, 0.4);
  scene.add(hemiLight);

  // Ground plane (receives shadows)
  const groundGeo = new THREE.PlaneGeometry(80, 80);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x0d1520, roughness: 0.9 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid
  const gridHelper = new THREE.GridHelper(40, 40, 0x1a2a3a, 0x111827);
  scene.add(gridHelper);

  window.addEventListener('resize', onWindowResize);
  animate();
}

function onWindowResize() {
  const canvas = document.getElementById('canvas3d');
  const width = canvas.clientWidth;
  const height = canvas.clientHeight;
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height);
}

function animate() {
  requestAnimationFrame(animate);

  // Animate rotor spin for drones
  for (const deviceId in deviceModels) {
    const model = deviceModels[deviceId];
    if (model.rotors) {
      model.rotors.forEach(rotor => {
        rotor.rotation.z += 0.3;
      });
    }
  }

  // Smooth position updates each frame (lerp continues in animate loop)
  for (const deviceId in deviceModels) {
    const model = deviceModels[deviceId];
    if (model._targetPos) {
      model.position.lerp(model._targetPos, 0.08);
    }
  }

  renderer.render(scene, camera);
}

// ========== 3D MODEL CREATION ==========
function createDroneModel(position = { x: 0, y: 0, z: 0 }) {
  const group = new THREE.Group();
  group.position.set(position.x, position.y, position.z);

  // Body (center cube)
  const bodyGeom = new THREE.BoxGeometry(0.6, 0.3, 0.6);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00B4D8 });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  group.add(body);

  // 4 Arms
  const arms = [];
  const armPositions = [
    { pos: [0.4, 0, 0.4], rot: Math.PI / 4 },
    { pos: [-0.4, 0, 0.4], rot: -Math.PI / 4 },
    { pos: [0.4, 0, -0.4], rot: Math.PI - Math.PI / 4 },
    { pos: [-0.4, 0, -0.4], rot: Math.PI + Math.PI / 4 },
  ];

  armPositions.forEach(({ pos, rot }) => {
    const armGeom = new THREE.BoxGeometry(0.15, 0.15, 0.8);
    const armMat = new THREE.MeshStandardMaterial({ color: 0x1B2838 });
    const arm = new THREE.Mesh(armGeom, armMat);
    arm.position.set(pos[0], pos[1], pos[2]);
    arm.rotation.z = rot;
    group.add(arm);
    arms.push(arm);
  });

  // 4 Rotors (torus at end of each arm)
  const rotors = [];
  armPositions.forEach(({ pos }) => {
    const rotorGeom = new THREE.TorusGeometry(0.2, 0.05, 8, 16);
    const rotorMat = new THREE.MeshStandardMaterial({ color: 0x90E0EF });
    const rotor = new THREE.Mesh(rotorGeom, rotorMat);
    rotor.position.set(pos[0] * 1.5, 0, pos[2] * 1.5);
    rotor.rotation.x = Math.PI / 2;
    group.add(rotor);
    rotors.push(rotor);
  });

  // Camera gimbal (small cone underneath)
  const gimbalGeom = new THREE.ConeGeometry(0.15, 0.3, 8);
  const gimbalMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
  const gimbal = new THREE.Mesh(gimbalGeom, gimbalMat);
  gimbal.position.y = -0.3;
  gimbal.rotation.z = Math.PI;
  group.add(gimbal);

  // Landing gear (2 small rods)
  [0.2, -0.2].forEach(x => {
    const gearGeom = new THREE.CylinderGeometry(0.03, 0.03, 0.2, 8);
    const gearMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const gear = new THREE.Mesh(gearGeom, gearMat);
    gear.position.set(x, -0.3, 0);
    group.add(gear);
  });

  group.rotors = rotors;
  scene.add(group);
  return group;
}

function createRobotArmModel(position = { x: 0, y: 0, z: 0 }) {
  const group = new THREE.Group();
  group.position.set(position.x, position.y, position.z);

  // Base (cylinder)
  const baseGeom = new THREE.CylinderGeometry(0.5, 0.6, 0.3, 16);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x1B2838 });
  const base = new THREE.Mesh(baseGeom, baseMat);
  group.add(base);

  // 3 arm segments with joints
  const segments = [];
  let lastPos = new THREE.Vector3(0, 0.15, 0);

  for (let i = 0; i < 3; i++) {
    const segmentGroup = new THREE.Group();
    segmentGroup.position.copy(lastPos);

    // Segment body
    const segGeom = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 8);
    const segMat = new THREE.MeshStandardMaterial({ color: 0x00B4D8 });
    const seg = new THREE.Mesh(segGeom, segMat);
    seg.position.y = 0.4;
    segmentGroup.add(seg);

    // Joint (sphere)
    const jointGeom = new THREE.SphereGeometry(0.15, 8, 8);
    const jointMat = new THREE.MeshStandardMaterial({ color: 0xf59e0b });
    const joint = new THREE.Mesh(jointGeom, jointMat);
    joint.position.y = 0.8;
    segmentGroup.add(joint);

    group.add(segmentGroup);
    segments.push(segmentGroup);
    lastPos.y += 0.8;
  }

  // Gripper (2 fingers)
  const gripperGroup = new THREE.Group();
  gripperGroup.position.copy(lastPos);

  [-0.15, 0.15].forEach(x => {
    const fingerGeom = new THREE.BoxGeometry(0.08, 0.08, 0.3);
    const fingerMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
    const finger = new THREE.Mesh(fingerGeom, fingerMat);
    finger.position.set(x, 0, 0.3);
    gripperGroup.add(finger);
  });

  group.add(gripperGroup);
  group.gripper = gripperGroup;

  scene.add(group);
  return group;
}

function createSmartLightModel(position = { x: 0, y: 0, z: 0 }) {
  const group = new THREE.Group();
  group.position.set(position.x, position.y, position.z);

  // Base (cylinder)
  const baseGeom = new THREE.CylinderGeometry(0.25, 0.3, 0.2, 16);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x1B2838 });
  const base = new THREE.Mesh(baseGeom, baseMat);
  group.add(base);

  // Bulb (sphere)
  const bulbGeom = new THREE.SphereGeometry(0.3, 16, 16);
  const bulbMat = new THREE.MeshStandardMaterial({
    color: 0xffff00,
    emissive: 0x000000,
    emissiveIntensity: 0,
  });
  const bulb = new THREE.Mesh(bulbGeom, bulbMat);
  bulb.position.y = 0.4;
  group.add(bulb);

  group.bulb = bulb;
  group.bulbMat = bulbMat;

  scene.add(group);
  return group;
}

function createDeviceModel(deviceId, deviceType, position = { x: 0, y: 0, z: 0 }) {
  if (deviceModels[deviceId]) {
    scene.remove(deviceModels[deviceId]);
  }

  let model;
  if (deviceType === 'drone') {
    model = createDroneModel(position);
  } else if (deviceType === 'robot_arm') {
    model = createRobotArmModel(position);
  } else if (deviceType === 'smart_light') {
    model = createSmartLightModel(position);
  } else {
    model = new THREE.Group();
    scene.add(model);
  }

  deviceModels[deviceId] = model;
  return model;
}

function updateDeviceModelPosition(deviceId, position) {
  const model = deviceModels[deviceId];
  if (!model) return;

  // Map server coords to Three.js: server x→Three x, server y→Three z, server z (altitude)→Three y
  model._targetPos = new THREE.Vector3(
    position.x || 0,
    position.z || 0,  // altitude maps to Three.js Y (up)
    position.y || 0   // server Y maps to Three.js Z (depth)
  );
}

// ========== API CALLS ==========
async function fetchAPI(endpoint, options = {}) {
  try {
    const response = await fetch(`${API_BASE}${endpoint}`, options);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return await response.json();
  } catch (error) {
    console.error(`API Error: ${endpoint}`, error);
    showToast(`Error: ${error.message}`, 'error');
    return null;
  }
}

async function loadDevices() {
  const data = await fetchAPI('/api/devices');
  if (!data) return;

  state.devices = data;
  renderDeviceList();
}

async function loadTelemetry() {
  const data = await fetchAPI('/api/telemetry');
  if (!data) return;

  state.lastTelemetry = data;

  // Update 3D models
  for (const deviceId in data) {
    const telemetry = data[deviceId];
    if (telemetry.position) {
      updateDeviceModelPosition(deviceId, telemetry.position);
    }
  }

  // Update telemetry values in right panel without full re-render (avoids flicker)
  if (state.selectedDeviceId && state.currentView === 'control') {
    updateTelemetryDisplay();
  }
}

async function sendCommand(deviceId, command, params = {}) {
  const payload = { device_id: deviceId, command, params };
  const response = await fetchAPI('/api/command', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });

  if (response && response.success) {
    showToast(`✓ ${command}`, 'success');
  } else {
    showToast(`✗ ${response?.message || 'Command failed'}`, 'error');
  }
}

async function compilePlan(deviceId, text) {
  const response = await fetchAPI('/api/nlp/compile', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ device_id: deviceId, text }),
  });

  if (response) {
    state.currentPlan = response;
    state.executingPlanStepIndex = 0;
    renderPlan();
    return response;
  }
  return null;
}

async function executePlan(plan) {
  const response = await fetchAPI('/api/nlp/execute', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ plan }),
  });

  if (response) {
    showToast('Plan executing...', 'success');
    pollExecutionState();
  }
}

async function pollExecutionState() {
  if (!state.currentPlan) return;

  const deviceId = state.currentPlan.device_id;
  const response = await fetchAPI(`/api/nlp/execution/${deviceId}`);

  if (response) {
    state.executingPlanStepIndex = response.current_step || 0;
    renderPlan();

    if (response.status === 'running') {
      setTimeout(pollExecutionState, 500);
    } else if (response.status === 'completed') {
      state.executingPlanStepIndex = response.total_steps || state.currentPlan.steps.length;
      renderPlan();
      showToast('Plan complete!', 'success');
      setTimeout(() => {
        state.currentPlan = null;
        document.getElementById('nlpPlan').classList.remove('active');
      }, 2000);
    } else if (response.status === 'failed' || response.status === 'stopped') {
      showToast(`Plan ${response.status}: ${response.error || response.message || ''}`, 'error');
    }
  }
}

async function loadTemplates() {
  const data = await fetchAPI('/api/templates');
  if (!data) return;

  state.templates = data;
}

async function instantiateTemplate(templateId, name) {
  const response = await fetchAPI('/api/templates/instantiate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ template_id: templateId, name: name || undefined }),
  });

  if (response && (response.ok || response.device)) {
    showToast(`✓ ${response.device?.name || 'Device'} created`, 'success');
    await loadDevices();
    closeModal('libraryModal');
    // Auto-select the new device
    if (response.device?.id) {
      selectDevice(response.device.id, state.devices[response.device.id]);
    }
  }
}

// ========== UI RENDERING ==========
function renderDeviceList() {
  const list = document.getElementById('deviceList');
  list.innerHTML = '';

  for (const deviceId in state.devices) {
    const device = state.devices[deviceId];
    const isActive = deviceId === state.selectedDeviceId;

    const icons = {
      drone: '🚁',
      robot_arm: '🦾',
      smart_light: '💡',
    };

    const row = document.createElement('div');
    row.className = `device-row ${isActive ? 'active' : ''}`;
    row.innerHTML = `
      <div class="device-icon">${icons[device.device_type] || '⚙️'}</div>
      <div class="device-body">
        <div class="device-name">${device.name}</div>
        <div class="device-type">${device.device_type}</div>
        <div class="device-status">
          <div class="status-dot ${device.connected ? '' : 'offline'}"></div>
          <span>${device.connected ? 'Connected' : 'Offline'}</span>
        </div>
      </div>
    `;

    row.addEventListener('click', () => selectDevice(deviceId, device));
    list.appendChild(row);
  }
}

function selectDevice(deviceId, device) {
  state.selectedDeviceId = deviceId;

  // Clear old model
  for (const id in deviceModels) {
    scene.remove(deviceModels[id]);
  }
  deviceModels = {};

  // Create new model
  createDeviceModel(deviceId, device.device_type, { x: 0, y: 0, z: 0 });

  // Add tab if not exists
  addTab(deviceId, device.name);

  // Render UI
  renderDeviceList();
  renderTabs();
  renderRightPanel();
}

function addTab(deviceId, deviceName) {
  if (document.querySelector(`[data-device-id="${deviceId}"]`)) {
    return; // Already exists
  }

  const tab = document.createElement('div');
  tab.className = 'tab active';
  tab.dataset.deviceId = deviceId;
  tab.innerHTML = `
    ${deviceName}
    <div class="tab-close">×</div>
  `;

  // Deactivate other tabs
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');

  tab.addEventListener('click', (e) => {
    if (e.target.closest('.tab-close')) {
      removeTab(deviceId);
    } else {
      selectDevice(deviceId, state.devices[deviceId]);
    }
  });

  document.getElementById('tabBar').appendChild(tab);
}

function removeTab(deviceId) {
  const tab = document.querySelector(`[data-device-id="${deviceId}"]`);
  if (tab) tab.remove();

  if (state.selectedDeviceId === deviceId) {
    const remainingTab = document.querySelector('.tab');
    if (remainingTab) {
      const nextDeviceId = remainingTab.dataset.deviceId;
      selectDevice(nextDeviceId, state.devices[nextDeviceId]);
    } else {
      state.selectedDeviceId = null;
      renderRightPanel();
    }
  }
}

function renderTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    if (tab.dataset.deviceId === state.selectedDeviceId) {
      tab.classList.add('active');
    } else {
      tab.classList.remove('active');
    }
  });
}

function renderRightPanel() {
  const panel = document.getElementById('rpanel');

  if (!state.selectedDeviceId || !state.devices[state.selectedDeviceId]) {
    panel.innerHTML = '<div style="padding: 20px; color: var(--text-muted); font-size: 12px;">Select a device to view details.</div>';
    return;
  }

  const device = state.devices[state.selectedDeviceId];
  const telemetry = state.lastTelemetry[state.selectedDeviceId] || {};

  let content = `<div class="rpanel-section">`;
  content += `<div class="rpanel-title">${device.name}</div>`;
  content += `</div>`;

  // Telemetry Section
  if (Object.keys(telemetry).length > 0) {
    content += `<div class="rpanel-section">`;
    content += `<div class="rpanel-title">Telemetry</div>`;

    if (telemetry.battery !== undefined) {
      const batteryColor = telemetry.battery > 30 ? 'var(--success)' : 'var(--warning)';
      content += `<div class="telemetry-item">
        <span class="telemetry-label">Battery</span>
        <span class="telemetry-value" style="color: ${batteryColor};">${telemetry.battery}%</span>
      </div>`;
    }

    if (telemetry.position) {
      content += `<div class="telemetry-item">
        <span class="telemetry-label">Position</span>
        <span class="telemetry-value">X: ${telemetry.position.x?.toFixed(2)} Y: ${telemetry.position.y?.toFixed(2)} Z: ${telemetry.position.z?.toFixed(2)}</span>
      </div>`;
    }

    if (telemetry.altitude !== undefined) {
      content += `<div class="telemetry-item">
        <span class="telemetry-label">Altitude</span>
        <span class="telemetry-value">${telemetry.altitude.toFixed(2)}m</span>
      </div>`;
    }

    if (telemetry.is_flying !== undefined) {
      content += `<div class="telemetry-item">
        <span class="telemetry-label">Status</span>
        <span class="telemetry-value">${telemetry.is_flying ? '🛸 Flying' : '🛬 Landed'}</span>
      </div>`;
    }

    if (telemetry.brightness !== undefined) {
      content += `<div class="telemetry-item">
        <span class="telemetry-label">Brightness</span>
        <span class="telemetry-value">${(telemetry.brightness * 100).toFixed(0)}%</span>
      </div>`;
    }

    if (telemetry.color) {
      content += `<div class="telemetry-item">
        <span class="telemetry-label">Color</span>
        <span class="telemetry-value" style="background: rgb(${telemetry.color.r}, ${telemetry.color.g}, ${telemetry.color.b}); display: inline-block; width: 20px; height: 20px; border-radius: 4px; margin-left: 8px;"></span>
      </div>`;
    }

    content += `</div>`;
  }

  // Controls Section
  if (state.currentView === 'control') {
    content += `<div class="rpanel-section">`;
    content += `<div class="rpanel-title">Controls</div>`;
    content += `<div class="control-grid" id="controlGrid"></div>`;
    content += `</div>`;
  }

  panel.innerHTML = content;

  // Render device-specific controls
  if (state.currentView === 'control') {
    renderDeviceControls(device.device_type);
  }
}

function updateTelemetryDisplay() {
  // Lightweight telemetry update without re-rendering the whole panel
  const telemetry = state.lastTelemetry[state.selectedDeviceId] || {};
  const items = document.querySelectorAll('.telemetry-value');
  if (items.length === 0) return; // Panel not yet rendered, do full render
  // For simplicity, just update known fields by label
  document.querySelectorAll('.telemetry-item').forEach(item => {
    const label = item.querySelector('.telemetry-label')?.textContent;
    const valEl = item.querySelector('.telemetry-value');
    if (!label || !valEl) return;
    if (label === 'Battery' && telemetry.battery !== undefined) {
      valEl.textContent = telemetry.battery + '%';
      valEl.style.color = telemetry.battery > 30 ? 'var(--success)' : 'var(--warning)';
    } else if (label === 'Position' && telemetry.position) {
      valEl.textContent = `X: ${telemetry.position.x?.toFixed(1)} Y: ${telemetry.position.y?.toFixed(1)} Z: ${telemetry.position.z?.toFixed(1)}`;
    } else if (label === 'Altitude' && telemetry.altitude !== undefined) {
      valEl.textContent = telemetry.altitude.toFixed(1) + 'm';
    } else if (label === 'Status' && telemetry.is_flying !== undefined) {
      valEl.textContent = telemetry.is_flying ? '🛸 Flying' : '🛬 Landed';
    }
  });
}

function renderPlan() {
  const planDiv = document.getElementById('nlpPlan');
  if (!state.currentPlan) {
    planDiv.classList.remove('active');
    return;
  }

  const plan = state.currentPlan;
  let html = `<div class="plan-title">Execution Plan</div>`;

  plan.steps.forEach((step, idx) => {
    let status = 'pending';
    if (idx < state.executingPlanStepIndex) status = 'done';
    if (idx === state.executingPlanStepIndex) status = 'current';

    html += `<div class="plan-step ${status === 'current' ? 'current' : ''}">
      <span class="plan-chip ${status}">${status}</span>
      ${step.description || step.command}
    </div>`;
  });

  html += `<button class="plan-execute" onclick="executePlan(state.currentPlan)">▶ Execute Plan</button>`;

  planDiv.innerHTML = html;
  planDiv.classList.add('active');
}

// ========== MODAL HELPERS ==========
function showModal(modalId) {
  document.getElementById(modalId).classList.add('active');
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('active');
}

function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 3000);
}

// ========== EVENT LISTENERS ==========
document.getElementById('addDeviceBtn').addEventListener('click', () => {
  showModal('addDeviceModal');
});

document.getElementById('closeAddModal').addEventListener('click', () => {
  closeModal('addDeviceModal');
});

document.getElementById('createDeviceBtn').addEventListener('click', async () => {
  const name = document.getElementById('deviceNameInput').value.trim();
  const type = document.getElementById('deviceTypeSelect').value;

  if (!name || !type) {
    showToast('Please fill all fields', 'error');
    return;
  }

  const response = await fetchAPI('/api/add_device', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ device_type: type, name }),
  });

  if (response && response.id) {
    showToast(`✓ ${name} added`, 'success');
    document.getElementById('deviceNameInput').value = '';
    document.getElementById('deviceTypeSelect').value = '';
    closeModal('addDeviceModal');
    await loadDevices();
    selectDevice(response.id, state.devices[response.id]);
  }
});

document.getElementById('overviewBtn').addEventListener('click', () => {
  state.currentView = 'overview';
  renderRightPanel();
  document.getElementById('overviewBtn').classList.add('active');
  document.getElementById('controlBtn').classList.remove('active');
});

document.getElementById('controlBtn').addEventListener('click', () => {
  state.currentView = 'control';
  renderRightPanel();
  document.getElementById('controlBtn').classList.add('active');
  document.getElementById('overviewBtn').classList.remove('active');
});

document.getElementById('nlpSubmit').addEventListener('click', async () => {
  const text = document.getElementById('nlpInput').value.trim();
  if (!text || !state.selectedDeviceId) {
    showToast('Select a device and enter a command', 'warning');
    return;
  }

  const plan = await compilePlan(state.selectedDeviceId, text);
  document.getElementById('nlpInput').value = '';
});

document.getElementById('nlpInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('nlpSubmit').click();
  }
});

document.getElementById('closeLibraryModal').addEventListener('click', () => {
  closeModal('libraryModal');
});

// Robot Library Modal (N key) — skip if typing in an input
document.addEventListener('keypress', async (e) => {
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === 'n' || e.key === 'N') {
    if (state.templates.length === 0) {
      await loadTemplates();
    }

    const grid = document.getElementById('templateGrid');
    grid.innerHTML = '';

    state.templates.forEach(template => {
      const card = document.createElement('div');
      card.className = 'template-card';
      card.innerHTML = `
        <div class="template-icon">${template.icon || '⚙️'}</div>
        <div class="template-name">${template.display_name}</div>
        <div class="template-desc">${template.description}</div>
      `;
      card.addEventListener('click', () => {
        const name = prompt(`Device name (${template.display_name}):`, template.display_name);
        if (name) {
          instantiateTemplate(template.template_id, name);
        }
      });
      grid.appendChild(card);
    });

    showModal('libraryModal');
  }
});

// ========== INITIALIZATION ==========
async function initialize() {
  initThreeJS();
  showModal('loadingOverlay');

  // Load initial data
  await loadDevices();
  await loadTemplates();

  hideLoadingOverlay();

  // Start polling
  setInterval(loadTelemetry, TELEMETRY_POLL_INTERVAL);

  // Select first device if available
  const firstDeviceId = Object.keys(state.devices)[0];
  if (firstDeviceId) {
    selectDevice(firstDeviceId, state.devices[firstDeviceId]);
  } else {
    renderRightPanel();
  }
}

function hideLoadingOverlay() {
  document.getElementById('loadingOverlay').classList.remove('active');
}

// Start app
initialize();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNIX Fleet Dashboard</title>
<style>
/* ── Reset & Theme ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --navy: #0D1B2A;
    --deep-blue: #1B2838;
    --teal: #00B4D8;
    --light-teal: #90E0EF;
    --ice: #CAF0F8;
    --bg: #0a1120;
    --card-bg: #111b2e;
    --card-border: #1e2d44;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #3b82f6;
    --purple: #8b5cf6;
    --radius: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

html, body { height: 100%; overflow: hidden; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
}

/* ── Layout Grid ── */
.layout {
    display: grid;
    height: 100vh;
    grid-template-columns: 240px 1fr 320px;
    grid-template-rows: 56px 1fr 180px;
    grid-template-areas:
        "header  header  header"
        "left    center  right"
        "left    bottom  bottom";
    gap: 1px;
    background: var(--card-border);
}

/* ── Header / Top Bar ── */
.header {
    grid-area: header;
    background: var(--deep-blue);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 24px;
    border-bottom: 1px solid var(--card-border);
    z-index: 100;
}
.header .logo {
    font-size: 16px;
    font-weight: 700;
    color: var(--teal);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.header .logo a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 400;
}
.header .logo a:hover { color: var(--teal); }

.health-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 16px;
    border-radius: 20px;
    background: rgba(16, 185, 129, 0.15);
    border: 1px solid rgba(16, 185, 129, 0.3);
}
.health-badge.warning { background: rgba(245, 158, 11, 0.15); border-color: rgba(245, 158, 11, 0.3); }
.health-badge.danger { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3); }

.health-score {
    font-size: 22px;
    font-weight: 800;
    color: var(--success);
}
.health-badge.warning .health-score { color: var(--warning); }
.health-badge.danger .health-score { color: var(--danger); }

.health-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.header-stats {
    display: flex;
    gap: 20px;
    margin-left: auto;
}
.header-stat {
    text-align: center;
}
.header-stat .val {
    font-size: 18px;
    font-weight: 700;
}
.header-stat .lbl {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.alert-badge-btn {
    position: relative;
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
}
.alert-badge-btn:hover { background: rgba(255,255,255,0.05); }
.alert-badge-btn .count {
    background: var(--danger);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
}
.alert-badge-btn .count.zero { background: var(--success); }

.tab-bar {
    display: flex;
    gap: 2px;
    margin-left: 16px;
}
.tab-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 6px 16px;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
}
.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.tab-btn.active {
    color: var(--teal);
    background: var(--card-bg);
    border-bottom: 2px solid var(--teal);
}

/* ── Left Panel: Locations ── */
.left-panel {
    grid-area: left;
    background: var(--card-bg);
    overflow-y: auto;
    padding: 12px;
}
.panel-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding: 8px 4px;
    border-bottom: 1px solid var(--card-border);
    margin-bottom: 8px;
}

.loc-card {
    background: var(--deep-blue);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
}
.loc-card:hover { border-color: var(--teal); }
.loc-card.active { border-color: var(--teal); background: rgba(0, 180, 216, 0.08); }

.loc-card .loc-color {
    width: 4px;
    height: 100%;
    position: absolute;
    left: 0;
    top: 0;
    border-radius: var(--radius) 0 0 var(--radius);
}
.loc-card .loc-name {
    font-weight: 600;
    font-size: 13px;
    padding-left: 8px;
}
.loc-card .loc-info {
    font-size: 11px;
    color: var(--text-muted);
    padding-left: 8px;
    margin-top: 2px;
}
.loc-card .loc-count {
    font-size: 18px;
    font-weight: 700;
    color: var(--teal);
    float: right;
    margin-top: -20px;
}

.loc-all-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--card-border);
    color: var(--text-muted);
    padding: 8px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 12px;
    margin-bottom: 12px;
}
.loc-all-btn:hover { border-color: var(--teal); color: var(--teal); }
.loc-all-btn.active { border-color: var(--teal); color: var(--teal); background: rgba(0,180,216,0.05); }

/* Scheduler section in left panel */
.scheduler-section { margin-top: 16px; }
.task-mini {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    background: var(--deep-blue);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: 12px;
}
.task-mini .priority-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
}
.task-mini .task-name { flex: 1; }
.task-mini .task-status {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    font-weight: 600;
}

/* ── Center: Map View / Analytics ── */
.center-panel {
    grid-area: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
}

.map-container {
    width: 100%;
    height: 100%;
    position: relative;
}
#fleetCanvas {
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
}
#fleetCanvas:active { cursor: grabbing; }

.map-controls {
    position: absolute;
    bottom: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.map-btn {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.map-btn:hover { background: var(--deep-blue); }

.map-legend {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(17, 27, 46, 0.9);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 11px;
    display: flex;
    gap: 12px;
}
.legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--text-muted);
}
.legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}

/* Device popup on map */
.device-popup {
    display: none;
    position: absolute;
    background: var(--card-bg);
    border: 1px solid var(--teal);
    border-radius: var(--radius);
    padding: 12px;
    min-width: 200px;
    box-shadow: var(--shadow);
    z-index: 50;
    pointer-events: auto;
}
.device-popup.visible { display: block; }
.device-popup .popup-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
}
.device-popup .popup-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 3px;
    color: var(--text-muted);
}
.device-popup .popup-row .val { color: var(--text); font-weight: 500; }

/* Analytics view */
.analytics-view {
    display: none;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 16px;
}
.analytics-view.visible { display: block; }

.analytics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
}
.chart-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 16px;
}
.chart-card .chart-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 12px;
}
.chart-card canvas {
    width: 100%;
    height: 200px;
}

.stat-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
}
.stat-card {
    flex: 1;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
}
.stat-card .stat-val {
    font-size: 28px;
    font-weight: 800;
}
.stat-card .stat-lbl {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
}

.leaderboard {
    list-style: none;
}
.leaderboard li {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--card-border);
    font-size: 13px;
}
.leaderboard li:last-child { border-bottom: none; }
.leaderboard .rank {
    color: var(--teal);
    font-weight: 700;
    margin-right: 8px;
}

/* ── Right Panel: Device Detail ── */
.right-panel {
    grid-area: right;
    background: var(--card-bg);
    overflow-y: auto;
    padding: 12px;
}

.no-selection {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    text-align: center;
    gap: 8px;
}
.no-selection .icon { font-size: 40px; opacity: 0.4; }

.device-detail .detail-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--card-border);
}
.detail-header .device-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    background: var(--deep-blue);
}
.detail-header .device-name { font-weight: 600; font-size: 15px; }
.detail-header .device-type { font-size: 11px; color: var(--text-muted); }

.status-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
}
.status-badge.online { background: rgba(16,185,129,0.2); color: var(--success); }
.status-badge.offline { background: rgba(239,68,68,0.2); color: var(--danger); }
.status-badge.error { background: rgba(239,68,68,0.2); color: var(--danger); }
.status-badge.charging { background: rgba(59,130,246,0.2); color: var(--info); }
.status-badge.idle { background: rgba(16,185,129,0.2); color: var(--success); }

.telemetry-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
}
.tele-item {
    background: var(--deep-blue);
    border-radius: 6px;
    padding: 8px 10px;
}
.tele-item .tele-lbl {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.tele-item .tele-val {
    font-size: 16px;
    font-weight: 700;
    margin-top: 2px;
}

.battery-bar-container {
    background: var(--deep-blue);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 12px;
}
.battery-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
}
.battery-bar {
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
}
.battery-bar .fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s;
}

.mini-chart-container {
    background: var(--deep-blue);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 12px;
}
.mini-chart-container .chart-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
}
.mini-chart-container canvas {
    width: 100%;
    height: 80px;
}

.mission-list {
    margin-bottom: 12px;
}
.mission-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    background: var(--deep-blue);
    border-radius: 6px;
    margin-bottom: 3px;
    font-size: 12px;
}
.mission-item .mission-icon { font-size: 14px; }
.mission-item .mission-name { flex: 1; }
.mission-item .mission-time { color: var(--text-muted); font-size: 11px; }

.quick-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
}
.action-btn {
    background: var(--deep-blue);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    text-align: center;
    transition: all 0.15s;
}
.action-btn:hover { border-color: var(--teal); color: var(--teal); }
.action-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

.ai-summary {
    background: var(--deep-blue);
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.6;
}
.ai-summary .ai-label {
    font-size: 10px;
    color: var(--purple);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
}

/* ── Bottom Panel: Activity Feed ── */
.bottom-panel {
    grid-area: bottom;
    background: var(--card-bg);
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--card-border);
}
.bottom-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--card-border);
    flex-shrink: 0;
}
.bottom-header .panel-title { border: none; margin: 0; padding: 0; }
.filter-pills {
    display: flex;
    gap: 4px;
}
.filter-pill {
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--text-muted);
    padding: 2px 10px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 11px;
}
.filter-pill:hover { border-color: var(--teal); color: var(--teal); }
.filter-pill.active { background: var(--teal); color: var(--navy); border-color: var(--teal); font-weight: 600; }

.events-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 4px 16px;
}
.event-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(30,45,68,0.5);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.1s;
}
.event-row:hover { background: rgba(255,255,255,0.02); }
.event-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
}
.event-time {
    color: var(--text-muted);
    font-size: 11px;
    min-width: 60px;
}
.event-msg { flex: 1; }
.event-device {
    color: var(--teal);
    font-size: 11px;
    font-weight: 500;
}

/* ── Alerts Dropdown ── */
.alerts-dropdown {
    display: none;
    position: absolute;
    top: 52px;
    right: 20px;
    width: 360px;
    max-height: 400px;
    overflow-y: auto;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    z-index: 200;
    padding: 8px;
}
.alerts-dropdown.visible { display: block; }
.alert-item {
    display: flex;
    gap: 10px;
    padding: 8px;
    border-radius: 6px;
    margin-bottom: 4px;
    background: var(--deep-blue);
    align-items: flex-start;
}
.alert-item .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.alert-item .alert-text { flex: 1; }
.alert-item .alert-msg { font-size: 13px; }
.alert-item .alert-time { font-size: 11px; color: var(--text-muted); }
.alert-item .alert-dismiss {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
}
.alert-item .alert-dismiss:hover { color: var(--text); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Hidden panels toggle ── */
.view-panel { display: none; }
.view-panel.visible { display: block; }
</style>
</head>
<body>

<div class="layout">
    <!-- ═══ Header / Top Bar ═══ -->
    <div class="header">
        <div class="logo">
            📡 OMNIX FLEET
            <a href="/">← Workspace</a>
        </div>

        <div class="health-badge" id="healthBadge">
            <div>
                <div class="health-score" id="healthScore">--</div>
                <div class="health-label">Fleet Health</div>
            </div>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" data-tab="map" onclick="switchTab('map')">Map</button>
            <button class="tab-btn" data-tab="analytics" onclick="switchTab('analytics')">Analytics</button>
        </div>

        <div class="header-stats">
            <div class="header-stat">
                <div class="val" id="statTotal">-</div>
                <div class="lbl">Total</div>
            </div>
            <div class="header-stat">
                <div class="val" style="color:var(--success)" id="statOnline">-</div>
                <div class="lbl">Online</div>
            </div>
            <div class="header-stat">
                <div class="val" style="color:var(--danger)" id="statOffline">-</div>
                <div class="lbl">Offline</div>
            </div>
            <div class="header-stat">
                <div class="val" style="color:var(--teal)" id="statBattery">-</div>
                <div class="lbl">Avg Battery</div>
            </div>
        </div>

        <button class="alert-badge-btn" id="alertBtn" onclick="toggleAlerts()">
            🔔 Alerts <span class="count zero" id="alertCount">0</span>
        </button>
    </div>

    <!-- ═══ Left Panel: Locations & Tasks ═══ -->
    <div class="left-panel">
        <div class="panel-title">Locations</div>
        <button class="loc-all-btn active" id="locAllBtn" onclick="filterLocation(null)">
            All Locations
        </button>
        <div id="locationList"></div>

        <div class="scheduler-section">
            <div class="panel-title">Scheduled Tasks</div>
            <div id="taskList"></div>
        </div>
    </div>

    <!-- ═══ Center: Map / Analytics ═══ -->
    <div class="center-panel">
        <div class="map-container" id="mapView">
            <canvas id="fleetCanvas"></canvas>
            <div class="map-legend">
                <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div> Online</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--warning)"></div> Degraded</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div> Offline</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--info)"></div> Charging</div>
            </div>
            <div class="map-controls">
                <button class="map-btn" onclick="mapZoom(1.2)" title="Zoom In">+</button>
                <button class="map-btn" onclick="mapZoom(0.8)" title="Zoom Out">−</button>
                <button class="map-btn" onclick="mapReset()" title="Reset View">⊙</button>
            </div>
        </div>
        <div class="device-popup" id="devicePopup"></div>

        <div class="analytics-view" id="analyticsView">
            <div class="stat-row" id="analyticsStats"></div>
            <div class="analytics-grid" id="analyticsGrid"></div>
        </div>
    </div>

    <!-- ═══ Right Panel: Device Detail ═══ -->
    <div class="right-panel" id="rightPanel">
        <div class="no-selection" id="noSelection">
            <div class="icon">🤖</div>
            <div>Select a device on the map<br>to view details</div>
        </div>
        <div class="device-detail" id="deviceDetail" style="display:none"></div>
    </div>

    <!-- ═══ Bottom Panel: Activity Feed ═══ -->
    <div class="bottom-panel">
        <div class="bottom-header">
            <div class="panel-title">Activity Feed</div>
            <div class="filter-pills">
                <button class="filter-pill active" data-filter="all" onclick="filterEvents('all',this)">All</button>
                <button class="filter-pill" data-filter="alert" onclick="filterEvents('alert',this)">Alerts</button>
                <button class="filter-pill" data-filter="command" onclick="filterEvents('command',this)">Commands</button>
                <button class="filter-pill" data-filter="system" onclick="filterEvents('system',this)">System</button>
            </div>
        </div>
        <div class="events-scroll" id="eventsScroll"></div>
    </div>
</div>

<!-- Alerts Dropdown -->
<div class="alerts-dropdown" id="alertsDropdown"></div>

<script>
// ══════════════════════════════════════════════════════
// OMNIX Fleet Dashboard — Client
// ══════════════════════════════════════════════════════

const API = '';
let fleetData = { overview: null, devices: [], locations: [], analytics: null, tasks: [], events: [] };
let selectedDeviceId = null;
let selectedLocationId = null;
let currentTab = 'map';
let eventFilter = 'all';

// ── Map State ──
const mapState = {
    zoom: 1,
    panX: 0,
    panY: 0,
    dragging: false,
    lastX: 0,
    lastY: 0,
    devicePositions: [], // [{id, x, y, radius, device}]
    locationPositions: [], // [{id, x, y, radius, loc}]
};

// ── Device type icons (emoji) ──
const DEVICE_ICONS = {
    drone: '✈',
    robot_arm: '🦾',
    smart_light: '💡',
    rover: '🚗',
    humanoid: '🤖',
    unknown: '⬡',
};

const STATUS_COLORS = {
    online: '#10b981', idle: '#10b981', ready: '#10b981',
    hovering: '#10b981', flying: '#10b981', moving: '#10b981',
    degraded: '#f59e0b', warning: '#f59e0b',
    offline: '#ef4444', disconnected: '#ef4444',
    error: '#ef4444', fault: '#ef4444', emergency: '#ef4444',
    charging: '#3b82f6',
};

// ═══════════════════════════════════════
// API Calls
// ═══════════════════════════════════════

async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    try {
        const r = await fetch(API + path, opts);
        return await r.json();
    } catch (e) {
        console.error('API error:', path, e);
        return null;
    }
}

async function fetchAll() {
    const [overview, devResp, locResp, evtResp, taskResp] = await Promise.all([
        api('GET', '/api/fleet/overview'),
        api('GET', '/api/fleet/devices'),
        api('GET', '/api/fleet/locations'),
        api('GET', '/api/fleet/events?limit=100'),
        api('GET', '/api/fleet/schedule'),
    ]);
    fleetData.overview = overview;
    fleetData.devices = devResp?.devices || [];
    fleetData.locations = locResp?.locations || [];
    fleetData.events = evtResp?.events || [];
    fleetData.tasks = taskResp?.tasks || [];
    fleetData.taskQueue = taskResp?.queue || {};
}

async function fetchAnalytics() {
    fleetData.analytics = await api('GET', '/api/fleet/analytics');
}

// ═══════════════════════════════════════
// Seed demo data on first load
// ═══════════════════════════════════════

async function seedIfNeeded() {
    await api('POST', '/api/fleet/seed-demo');
}

// ═══════════════════════════════════════
// Render Functions
// ═══════════════════════════════════════

function renderHeader() {
    const o = fleetData.overview;
    if (!o) return;

    document.getElementById('healthScore').textContent = o.health_score;
    document.getElementById('statTotal').textContent = o.total_devices;
    document.getElementById('statOnline').textContent = o.online;
    document.getElementById('statOffline').textContent = o.offline;
    document.getElementById('statBattery').textContent = o.avg_battery + '%';

    const badge = document.getElementById('healthBadge');
    badge.className = 'health-badge' +
        (o.health_score < 50 ? ' danger' : o.health_score < 75 ? ' warning' : '');

    const alertCount = o.alert_count || 0;
    const countEl = document.getElementById('alertCount');
    countEl.textContent = alertCount;
    countEl.className = 'count' + (alertCount === 0 ? ' zero' : '');
}

function renderLocations() {
    const container = document.getElementById('locationList');
    container.innerHTML = fleetData.locations.map(loc => `
        <div class="loc-card ${selectedLocationId === loc.id ? 'active' : ''}"
             onclick="filterLocation('${loc.id}')">
            <div class="loc-color" style="background:${loc.color}"></div>
            <div class="loc-name">${esc(loc.name)}</div>
            <div class="loc-info">${esc(loc.address)}</div>
            <div class="loc-count">${loc.device_count}</div>
        </div>
    `).join('');

    document.getElementById('locAllBtn').className =
        'loc-all-btn' + (selectedLocationId === null ? ' active' : '');
}

function renderTasks() {
    const container = document.getElementById('taskList');
    const tasks = fleetData.tasks.slice(0, 8);
    const priorityColors = { critical: '#ef4444', high: '#f59e0b', normal: '#3b82f6', low: '#94a3b8' };
    const statusColors = {
        pending: 'color:var(--text-muted)',
        assigned: 'color:var(--info)',
        running: 'color:var(--warning)',
        completed: 'color:var(--success)',
        failed: 'color:var(--danger)',
        cancelled: 'color:var(--text-muted)',
    };

    container.innerHTML = tasks.map(t => `
        <div class="task-mini">
            <div class="priority-dot" style="background:${priorityColors[t.priority_label] || '#94a3b8'}"></div>
            <div class="task-name">${esc(t.name)}</div>
            <div class="task-status" style="${statusColors[t.status] || ''}">${t.status}</div>
        </div>
    `).join('') || '<div style="color:var(--text-muted);font-size:12px;padding:8px">No tasks scheduled</div>';
}

function renderEvents() {
    const container = document.getElementById('eventsScroll');
    let events = fleetData.events.slice().reverse();
    if (eventFilter !== 'all') {
        events = events.filter(e => e.event_type === eventFilter);
    }

    const sevColors = { info: 'var(--info)', warning: 'var(--warning)', critical: 'var(--danger)' };

    container.innerHTML = events.slice(0, 60).map(e => {
        const t = new Date(e.created_at * 1000);
        const time = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const devName = e.device_id ? getDeviceName(e.device_id) : '';
        return `
            <div class="event-row" onclick="${e.device_id ? `selectDevice('${e.device_id}')` : ''}">
                <div class="event-dot" style="background:${sevColors[e.severity] || 'var(--info)'}"></div>
                <div class="event-time">${time}</div>
                <div class="event-msg">${esc(e.message)}</div>
                ${devName ? `<div class="event-device">${esc(devName)}</div>` : ''}
            </div>
        `;
    }).join('') || '<div style="color:var(--text-muted);padding:12px;text-align:center">No events yet</div>';
}

function renderAlerts() {
    const dropdown = document.getElementById('alertsDropdown');
    const alerts = (fleetData.overview?.alerts || []).slice().reverse();

    if (alerts.length === 0) {
        dropdown.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted)">No active alerts</div>';
        return;
    }

    const icons = { battery_critical: '🔴', battery_warning: '🟡', device_offline: '📡', device_error: '⚠️', mission_failed: '❌', collision: '💥' };

    dropdown.innerHTML = alerts.map(a => {
        const t = new Date(a.created_at * 1000);
        return `
            <div class="alert-item">
                <div class="alert-icon">${icons[a.alert_type] || '⚠️'}</div>
                <div class="alert-text">
                    <div class="alert-msg">${esc(a.message)}</div>
                    <div class="alert-time">${t.toLocaleTimeString()}</div>
                </div>
                <button class="alert-dismiss" onclick="dismissAlert('${a.id}')" title="Dismiss">✕</button>
            </div>
        `;
    }).join('');
}

// ═══════════════════════════════════════
// Canvas Map Rendering
// ═══════════════════════════════════════

function initCanvas() {
    const canvas = document.getElementById('fleetCanvas');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;

    // Mouse events for pan
    canvas.addEventListener('mousedown', e => {
        mapState.dragging = true;
        mapState.lastX = e.clientX;
        mapState.lastY = e.clientY;
    });
    canvas.addEventListener('mousemove', e => {
        if (mapState.dragging) {
            mapState.panX += (e.clientX - mapState.lastX) * window.devicePixelRatio;
            mapState.panY += (e.clientY - mapState.lastY) * window.devicePixelRatio;
            mapState.lastX = e.clientX;
            mapState.lastY = e.clientY;
            drawMap();
        } else {
            handleMapHover(e);
        }
    });
    canvas.addEventListener('mouseup', () => { mapState.dragging = false; });
    canvas.addEventListener('mouseleave', () => {
        mapState.dragging = false;
        hidePopup();
    });
    canvas.addEventListener('click', handleMapClick);
    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        const factor = e.deltaY < 0 ? 1.1 : 0.9;
        mapZoom(factor);
    }, { passive: false });

    window.addEventListener('resize', () => {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;
        drawMap();
    });
}

function drawMap() {
    const canvas = document.getElementById('fleetCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    const dpr = window.devicePixelRatio;
    const zoom = mapState.zoom;

    ctx.clearRect(0, 0, W, H);

    // Background grid
    ctx.save();
    ctx.translate(mapState.panX, mapState.panY);
    ctx.scale(zoom, zoom);

    drawGrid(ctx, W, H, zoom);

    // Reset position arrays
    mapState.locationPositions = [];
    mapState.devicePositions = [];

    const locs = fleetData.locations;
    const devs = getFilteredDevices();

    // Draw locations
    locs.forEach(loc => {
        const x = loc.map_x * dpr;
        const y = loc.map_y * dpr;
        const r = 50 * dpr;

        // Location circle
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = hexToRgba(loc.color, 0.08);
        ctx.fill();
        ctx.strokeStyle = hexToRgba(loc.color, 0.4);
        ctx.lineWidth = 2 * dpr;
        ctx.setLineDash([6 * dpr, 4 * dpr]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Location label
        ctx.fillStyle = loc.color;
        ctx.font = `bold ${11 * dpr}px -apple-system, sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(loc.name, x, y - r - 8 * dpr);

        // Device count
        ctx.fillStyle = hexToRgba(loc.color, 0.6);
        ctx.font = `${10 * dpr}px -apple-system, sans-serif`;
        ctx.fillText(`${loc.device_count} devices`, x, y + r + 14 * dpr);

        mapState.locationPositions.push({ id: loc.id, x, y, radius: r, loc });
    });

    // Draw connection lines between swarm group members
    drawSwarmConnections(ctx, devs, dpr);

    // Draw mission paths
    drawMissionPaths(ctx, devs, dpr);

    // Draw devices
    devs.forEach(dev => {
        const pos = getDeviceMapPosition(dev, locs, dpr);
        const statusColor = STATUS_COLORS[dev.status] || '#94a3b8';
        const r = 16 * dpr;

        // Glow
        const glow = ctx.createRadialGradient(pos.x, pos.y, r * 0.5, pos.x, pos.y, r * 2);
        glow.addColorStop(0, hexToRgba(statusColor, 0.3));
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.fillRect(pos.x - r * 2, pos.y - r * 2, r * 4, r * 4);

        // Device circle
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
        ctx.fillStyle = hexToRgba(statusColor, 0.9);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5 * dpr;
        ctx.stroke();

        // Icon
        ctx.fillStyle = '#fff';
        ctx.font = `${13 * dpr}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(DEVICE_ICONS[dev.type] || '⬡', pos.x, pos.y);

        // Name label
        ctx.fillStyle = '#e2e8f0';
        ctx.font = `${9 * dpr}px -apple-system, sans-serif`;
        ctx.textBaseline = 'alphabetic';
        ctx.fillText(dev.name, pos.x, pos.y + r + 12 * dpr);

        // Battery indicator
        if (dev.battery !== null && dev.battery !== undefined) {
            const bw = 24 * dpr;
            const bh = 4 * dpr;
            const bx = pos.x - bw / 2;
            const by = pos.y + r + 16 * dpr;
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fillRect(bx, by, bw, bh);
            const batColor = dev.battery < 10 ? '#ef4444' : dev.battery < 20 ? '#f59e0b' : '#10b981';
            ctx.fillStyle = batColor;
            ctx.fillRect(bx, by, bw * (dev.battery / 100), bh);
        }

        // Selected highlight
        if (dev.id === selectedDeviceId) {
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, r + 5 * dpr, 0, Math.PI * 2);
            ctx.strokeStyle = '#00B4D8';
            ctx.lineWidth = 2 * dpr;
            ctx.setLineDash([4 * dpr, 4 * dpr]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        mapState.devicePositions.push({ id: dev.id, x: pos.x, y: pos.y, radius: r, device: dev });
    });

    ctx.restore();
}

function drawGrid(ctx, W, H, zoom) {
    const dpr = window.devicePixelRatio;
    const gridSize = 40 * dpr;
    ctx.strokeStyle = 'rgba(30, 45, 68, 0.5)';
    ctx.lineWidth = 1;

    const startX = -((mapState.panX / zoom) % gridSize);
    const startY = -((mapState.panY / zoom) % gridSize);

    for (let x = startX; x < W / zoom + gridSize; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, -mapState.panY / zoom);
        ctx.lineTo(x, (H - mapState.panY) / zoom);
        ctx.stroke();
    }
    for (let y = startY; y < H / zoom + gridSize; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(-mapState.panX / zoom, y);
        ctx.lineTo((W - mapState.panX) / zoom, y);
        ctx.stroke();
    }
}

function drawSwarmConnections(ctx, devs, dpr) {
    // Connect devices at the same location
    const byLoc = {};
    devs.forEach(dev => {
        const locId = dev.location?.id;
        if (locId) {
            if (!byLoc[locId]) byLoc[locId] = [];
            byLoc[locId].push(dev);
        }
    });

    Object.values(byLoc).forEach(group => {
        if (group.length < 2) return;
        const locs = fleetData.locations;
        ctx.strokeStyle = 'rgba(0, 180, 216, 0.15)';
        ctx.lineWidth = 1 * dpr;
        for (let i = 0; i < group.length; i++) {
            for (let j = i + 1; j < group.length; j++) {
                const p1 = getDeviceMapPosition(group[i], locs, dpr);
                const p2 = getDeviceMapPosition(group[j], locs, dpr);
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
        }
    });
}

function drawMissionPaths(ctx, devs, dpr) {
    devs.forEach(dev => {
        if (!dev.current_mission) return;
        const pos = getDeviceMapPosition(dev, fleetData.locations, dpr);
        // Draw a dotted path extending from device position
        ctx.strokeStyle = 'rgba(245, 158, 11, 0.4)';
        ctx.lineWidth = 2 * dpr;
        ctx.setLineDash([4 * dpr, 6 * dpr]);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        // Simulate a mission path direction
        const angle = (dev.heading || 0) * Math.PI / 180;
        ctx.lineTo(pos.x + Math.cos(angle) * 80 * dpr, pos.y - Math.sin(angle) * 80 * dpr);
        ctx.stroke();
        ctx.setLineDash([]);
    });
}

function getDeviceMapPosition(dev, locs, dpr) {
    // Position device near its location with offset based on device index
    const loc = dev.location;
    if (loc) {
        const locDevices = fleetData.devices.filter(d => d.location?.id === loc.id);
        const idx = locDevices.findIndex(d => d.id === dev.id);
        const count = locDevices.length;
        const angle = (idx / Math.max(count, 1)) * Math.PI * 2 - Math.PI / 2;
        const spread = 35 * dpr;
        return {
            x: loc.map_x * dpr + Math.cos(angle) * spread,
            y: loc.map_y * dpr + Math.sin(angle) * spread,
        };
    }
    // Unassigned devices go to a default area
    const allUnassigned = fleetData.devices.filter(d => !d.location);
    const idx = allUnassigned.findIndex(d => d.id === dev.id);
    return { x: 100 * dpr + idx * 60 * dpr, y: 450 * dpr };
}

function getFilteredDevices() {
    if (!selectedLocationId) return fleetData.devices;
    return fleetData.devices.filter(d => d.location?.id === selectedLocationId);
}

// ═══════════════════════════════════════
// Map Interaction
// ═══════════════════════════════════════

function handleMapClick(e) {
    const canvas = document.getElementById('fleetCanvas');
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio;
    const mx = (e.clientX - rect.left) * dpr;
    const my = (e.clientY - rect.top) * dpr;
    // Transform to map coordinates
    const mapX = (mx - mapState.panX) / mapState.zoom;
    const mapY = (my - mapState.panY) / mapState.zoom;

    // Check device hits
    for (const dp of mapState.devicePositions) {
        const dx = mapX - dp.x;
        const dy = mapY - dp.y;
        if (Math.sqrt(dx * dx + dy * dy) < dp.radius * 1.5) {
            selectDevice(dp.id);
            return;
        }
    }
    // Clicked empty space
    deselectDevice();
}

function handleMapHover(e) {
    const canvas = document.getElementById('fleetCanvas');
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio;
    const mx = (e.clientX - rect.left) * dpr;
    const my = (e.clientY - rect.top) * dpr;
    const mapX = (mx - mapState.panX) / mapState.zoom;
    const mapY = (my - mapState.panY) / mapState.zoom;

    for (const dp of mapState.devicePositions) {
        const dx = mapX - dp.x;
        const dy = mapY - dp.y;
        if (Math.sqrt(dx * dx + dy * dy) < dp.radius * 1.5) {
            showPopup(dp.device, e.clientX, e.clientY);
            canvas.style.cursor = 'pointer';
            return;
        }
    }
    canvas.style.cursor = mapState.dragging ? 'grabbing' : 'grab';
    hidePopup();
}

function showPopup(dev, x, y) {
    const popup = document.getElementById('devicePopup');
    const bat = dev.battery !== null ? dev.battery + '%' : 'N/A';
    popup.innerHTML = `
        <div class="popup-name">${DEVICE_ICONS[dev.type] || '⬡'} ${esc(dev.name)}</div>
        <div class="popup-row"><span>Status</span><span class="val">${dev.status}</span></div>
        <div class="popup-row"><span>Battery</span><span class="val">${bat}</span></div>
        <div class="popup-row"><span>Speed</span><span class="val">${dev.speed?.toFixed(1) || 0} m/s</span></div>
        <div class="popup-row"><span>Location</span><span class="val">${dev.location?.name || 'Unassigned'}</span></div>
    `;
    popup.style.left = Math.min(x + 10, window.innerWidth - 240) + 'px';
    popup.style.top = Math.min(y + 10, window.innerHeight - 160) + 'px';
    popup.classList.add('visible');
}

function hidePopup() {
    document.getElementById('devicePopup').classList.remove('visible');
}

function mapZoom(factor) {
    mapState.zoom = Math.max(0.3, Math.min(3, mapState.zoom * factor));
    drawMap();
}

function mapReset() {
    mapState.zoom = 1;
    mapState.panX = 0;
    mapState.panY = 0;
    drawMap();
}

// ═══════════════════════════════════════
// Device Selection & Detail Panel
// ═══════════════════════════════════════

function selectDevice(deviceId) {
    selectedDeviceId = deviceId;
    renderDeviceDetail();
    drawMap();
}

function deselectDevice() {
    selectedDeviceId = null;
    document.getElementById('noSelection').style.display = 'flex';
    document.getElementById('deviceDetail').style.display = 'none';
    drawMap();
}

function renderDeviceDetail() {
    const dev = fleetData.devices.find(d => d.id === selectedDeviceId);
    if (!dev) return;

    document.getElementById('noSelection').style.display = 'none';
    const detail = document.getElementById('deviceDetail');
    detail.style.display = 'block';

    const statusClass = ['online','idle','ready','hovering','flying','moving'].includes(dev.status)
        ? 'online' : ['error','fault','emergency'].includes(dev.status)
            ? 'error' : dev.status === 'charging' ? 'charging' : 'offline';

    const bat = dev.battery ?? 0;
    const batColor = bat < 10 ? 'var(--danger)' : bat < 20 ? 'var(--warning)' : 'var(--success)';

    detail.innerHTML = `
        <div class="detail-header">
            <div class="device-icon">${DEVICE_ICONS[dev.type] || '⬡'}</div>
            <div>
                <div class="device-name">${esc(dev.name)}</div>
                <div class="device-type">${dev.type} · ${dev.location?.name || 'Unassigned'}</div>
            </div>
            <span class="status-badge ${statusClass}">${dev.status}</span>
        </div>

        <div class="telemetry-grid">
            <div class="tele-item">
                <div class="tele-lbl">Speed</div>
                <div class="tele-val">${(dev.speed || 0).toFixed(1)} m/s</div>
            </div>
            <div class="tele-item">
                <div class="tele-lbl">Heading</div>
                <div class="tele-val">${(dev.heading || 0).toFixed(0)}°</div>
            </div>
            <div class="tele-item">
                <div class="tele-lbl">Signal</div>
                <div class="tele-val">${dev.signal_strength || 'N/A'}</div>
            </div>
            <div class="tele-item">
                <div class="tele-lbl">Position</div>
                <div class="tele-val" style="font-size:11px">${dev.position?.x?.toFixed(1)}, ${dev.position?.y?.toFixed(1)}, ${dev.position?.z?.toFixed(1)}</div>
            </div>
        </div>

        <div class="battery-bar-container">
            <div class="battery-bar-label">
                <span>Battery</span>
                <span style="color:${batColor};font-weight:700">${bat}%</span>
            </div>
            <div class="battery-bar">
                <div class="fill" style="width:${bat}%;background:${batColor}"></div>
            </div>
        </div>

        <div class="mini-chart-container">
            <div class="chart-label">Battery (24h)</div>
            <canvas id="batteryMiniChart"></canvas>
        </div>

        <div class="panel-title" style="margin-top:8px">Mission History</div>
        <div class="mission-list" id="missionList"></div>

        <div class="panel-title">Quick Actions</div>
        <div class="quick-actions">
            <button class="action-btn" onclick="deviceAction('${dev.id}','ping')">📡 Ping</button>
            <button class="action-btn" onclick="deviceAction('${dev.id}','return_home')">🏠 Recall</button>
            <button class="action-btn" onclick="deviceAction('${dev.id}','start_mission')">🚀 Mission</button>
            <button class="action-btn danger" onclick="deviceAction('${dev.id}','emergency_stop')">🛑 E-Stop</button>
        </div>

        <div class="ai-summary">
            <div class="ai-label">AI Knowledge Summary</div>
            <div id="aiSummary">Loading...</div>
        </div>
    `;

    // Draw battery mini chart
    drawBatteryMiniChart(dev.id);

    // Load mission history + AI summary
    loadDeviceExtras(dev.id);
}

async function loadDeviceExtras(deviceId) {
    // Device analytics for mission history
    const analytics = await api('GET', `/api/fleet/analytics/${deviceId}`);
    if (analytics?.mission_history) {
        const list = document.getElementById('missionList');
        if (list) {
            list.innerHTML = analytics.mission_history.slice(-10).reverse().map(m => {
                const t = new Date(m.ts * 1000);
                return `
                    <div class="mission-item">
                        <div class="mission-icon">${m.success ? '✅' : '❌'}</div>
                        <div class="mission-name">${esc(m.name)}</div>
                        <div class="mission-time">${t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
                    </div>
                `;
            }).join('') || '<div style="color:var(--text-muted);font-size:12px;padding:4px">No missions yet</div>';
        }
    }

    // AI knowledge
    try {
        const knowledge = await api('GET', `/api/ai/knowledge/${deviceId}`);
        const el = document.getElementById('aiSummary');
        if (el) {
            if (knowledge?.description_ai) {
                el.textContent = knowledge.description_ai;
            } else if (knowledge?.capabilities_inferred?.length) {
                el.textContent = 'Capabilities: ' + knowledge.capabilities_inferred.join(', ');
            } else {
                el.textContent = 'No AI analysis available. Run an AI enhancement scan to populate.';
            }
        }
    } catch (e) {
        const el = document.getElementById('aiSummary');
        if (el) el.textContent = 'AI module not available';
    }
}

function drawBatteryMiniChart(deviceId) {
    const canvas = document.getElementById('batteryMiniChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = (rect.width - 24) * window.devicePixelRatio;
    canvas.height = 80 * window.devicePixelRatio;
    const W = canvas.width;
    const H = canvas.height;
    const dpr = window.devicePixelRatio;

    // Use analytics battery history if available, otherwise simulate
    const analytics = fleetData.analytics?.device_analytics?.[deviceId];
    let data = analytics?.battery_history || [];
    if (data.length < 5) {
        // Generate synthetic data
        data = [];
        for (let i = 0; i < 48; i++) {
            data.push({ level: Math.max(15, 95 - i * 1.5 + Math.random() * 5) });
        }
    }

    if (data.length === 0) return;

    ctx.clearRect(0, 0, W, H);

    // Draw chart area
    const pad = 4 * dpr;
    const chartW = W - pad * 2;
    const chartH = H - pad * 2;

    // Gradient fill
    const gradient = ctx.createLinearGradient(0, pad, 0, H - pad);
    gradient.addColorStop(0, 'rgba(0, 180, 216, 0.3)');
    gradient.addColorStop(1, 'rgba(0, 180, 216, 0)');

    ctx.beginPath();
    ctx.moveTo(pad, H - pad);
    data.forEach((d, i) => {
        const x = pad + (i / (data.length - 1)) * chartW;
        const y = H - pad - (d.level / 100) * chartH;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });
    ctx.lineTo(pad + chartW, H - pad);
    ctx.lineTo(pad, H - pad);
    ctx.fillStyle = gradient;
    ctx.fill();

    // Line
    ctx.beginPath();
    data.forEach((d, i) => {
        const x = pad + (i / (data.length - 1)) * chartW;
        const y = H - pad - (d.level / 100) * chartH;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = '#00B4D8';
    ctx.lineWidth = 1.5 * dpr;
    ctx.stroke();
}

function drawUtilizationChart(data) {
    const canvas = document.getElementById('chartUtilization');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    setupChartCanvas(canvas, ctx);
    const W = canvas.width, H = canvas.height, dpr = window.devicePixelRatio;
    const pad = 30 * dpr;

    if (!data || data.length === 0) return;

    // Axes
    ctx.strokeStyle = 'rgba(148,163,184,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad, pad); ctx.lineTo(pad, H - pad); ctx.lineTo(W - pad, H - pad);
    ctx.stroke();

    // Labels
    ctx.fillStyle = '#94a3b8';
    ctx.font = `${9 * dpr}px sans-serif`;
    ctx.textAlign = 'center';
    for (let i = 0; i < data.length; i += 4) {
        const x = pad + (i / (data.length - 1)) * (W - 2 * pad);
        ctx.fillText(`${data[i].hour}h`, x, H - pad + 14 * dpr);
    }

    // Bars
    const barW = (W - 2 * pad) / data.length * 0.7;
    data.forEach((d, i) => {
        const x = pad + (i / data.length) * (W - 2 * pad);
        const barH = (d.utilization_pct / 100) * (H - 2 * pad);
        const gradient = ctx.createLinearGradient(x, H - pad - barH, x, H - pad);
        gradient.addColorStop(0, '#00B4D8');
        gradient.addColorStop(1, 'rgba(0,180,216,0.2)');
        ctx.fillStyle = gradient;
        ctx.fillRect(x, H - pad - barH, barW, barH);
    });
}

function drawMissionPieChart(success, failed) {
    const canvas = document.getElementById('chartMissions');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    setupChartCanvas(canvas, ctx);
    const W = canvas.width, H = canvas.height, dpr = window.devicePixelRatio;

    const total = success + failed;
    if (total === 0) {
        ctx.fillStyle = '#94a3b8';
        ctx.font = `${12 * dpr}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText('No missions recorded', W / 2, H / 2);
        return;
    }

    const cx = W / 2 - 40 * dpr;
    const cy = H / 2;
    const r = Math.min(W, H) * 0.35;
    const successAngle = (success / total) * Math.PI * 2;

    // Success slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + successAngle);
    ctx.fillStyle = '#10b981';
    ctx.fill();

    // Failed slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, -Math.PI / 2 + successAngle, -Math.PI / 2 + Math.PI * 2);
    ctx.fillStyle = '#ef4444';
    ctx.fill();

    // Inner circle (donut)
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = '#111b2e';
    ctx.fill();

    // Center text
    ctx.fillStyle = '#e2e8f0';
    ctx.font = `bold ${16 * dpr}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(total.toString(), cx, cy - 6 * dpr);
    ctx.font = `${9 * dpr}px sans-serif`;
    ctx.fillStyle = '#94a3b8';
    ctx.fillText('missions', cx, cy + 10 * dpr);

    // Legend
    const lx = cx + r + 30 * dpr;
    ctx.fillStyle = '#10b981';
    ctx.fillRect(lx, cy - 20 * dpr, 10 * dpr, 10 * dpr);
    ctx.fillStyle = '#e2e8f0';
    ctx.textAlign = 'left';
    ctx.font = `${10 * dpr}px sans-serif`;
    ctx.fillText(`Success (${success})`, lx + 14 * dpr, cy - 12 * dpr);

    ctx.fillStyle = '#ef4444';
    ctx.fillRect(lx, cy + 4 * dpr, 10 * dpr, 10 * dpr);
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText(`Failed (${failed})`, lx + 14 * dpr, cy + 12 * dpr);
}

function drawBatteryDistChart(dist) {
    const canvas = document.getElementById('chartBattery');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    setupChartCanvas(canvas, ctx);
    const W = canvas.width, H = canvas.height, dpr = window.devicePixelRatio;
    const pad = 30 * dpr;

    const categories = ['critical', 'low', 'medium', 'good', 'full'];
    const colors = ['#ef4444', '#f59e0b', '#3b82f6', '#10b981', '#00B4D8'];
    const labels = ['< 10%', '10-20%', '20-50%', '50-80%', '80-100%'];
    const values = categories.map(c => dist[c] || 0);
    const maxVal = Math.max(...values, 1);

    const barW = (W - 2 * pad) / categories.length * 0.6;
    const gap = (W - 2 * pad) / categories.length;

    values.forEach((v, i) => {
        const x = pad + i * gap + (gap - barW) / 2;
        const barH = (v / maxVal) * (H - 2 * pad - 20 * dpr);
        ctx.fillStyle = colors[i];
        ctx.fillRect(x, H - pad - barH, barW, barH);

        // Value on top
        ctx.fillStyle = '#e2e8f0';
        ctx.font = `bold ${10 * dpr}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(v.toString(), x + barW / 2, H - pad - barH - 6 * dpr);

        // Label
        ctx.fillStyle = '#94a3b8';
        ctx.font = `${8 * dpr}px sans-serif`;
        ctx.fillText(labels[i], x + barW / 2, H - pad + 12 * dpr);
    });
}

function drawHeatmapChart(data) {
    const canvas = document.getElementById('chartHeatmap');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    setupChartCanvas(canvas, ctx);
    const W = canvas.width, H = canvas.height, dpr = window.devicePixelRatio;
    const pad = 30 * dpr;

    if (!data || data.length === 0) return;
    const maxCount = Math.max(...data.map(d => d.count), 1);

    const cellW = (W - 2 * pad) / data.length;
    const cellH = H - 2 * pad;

    data.forEach((d, i) => {
        const intensity = d.count / maxCount;
        const x = pad + i * cellW;
        ctx.fillStyle = `rgba(0, 180, 216, ${0.1 + intensity * 0.8})`;
        ctx.fillRect(x, pad, cellW - 1, cellH);

        if (i % 4 === 0) {
            ctx.fillStyle = '#94a3b8';
            ctx.font = `${8 * dpr}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText(`${d.hour}h`, x + cellW / 2, H - pad + 12 * dpr);
        }
    });
}

function renderLeaderboards(a) {
    const topActive = document.getElementById('topActive');
    const uptimeBoard = document.getElementById('uptimeBoard');

    if (topActive) {
        topActive.innerHTML = a.top_active_devices.map((d, i) => `
            <li><span><span class="rank">#${i + 1}</span> ${getDeviceName(d.device_id)}</span>
            <span style="color:var(--teal)">${d.command_count} cmds</span></li>
        `).join('') || '<li style="color:var(--text-muted)">No data</li>';
    }

    if (uptimeBoard) {
        uptimeBoard.innerHTML = a.uptime_leaderboard.map((d, i) => `
            <li><span><span class="rank">#${i + 1}</span> ${getDeviceName(d.device_id)}</span>
            <span style="color:var(--success)">${d.uptime_pct}%</span></li>
        `).join('') || '<li style="color:var(--text-muted)">No data</li>';
    }
}

function setupChartCanvas(canvas, ctx) {
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio;
    canvas.width = (rect.width - 32) * dpr;
    canvas.height = 200 * dpr;
    canvas.style.width = (rect.width - 32) + 'px';
    canvas.style.height = '200px';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function filterLocation(locId) {
    selectedLocationId = locId;
    renderLocations();
    drawMap();
}

function filterEvents(filter, btn) {
    eventFilter = filter;
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    if (btn) btn.classList.add('active');
    renderEvents();
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');

    const mapView = document.getElementById('mapView');
    const analyticsView = document.getElementById('analyticsView');

    if (tab === 'map') {
        mapView.style.display = 'block';
        analyticsView.classList.remove('visible');
        drawMap();
    } else {
        mapView.style.display = 'none';
        analyticsView.classList.add('visible');
        renderAnalytics();
    }
}

function toggleAlerts() {
    const dd = document.getElementById('alertsDropdown');
    dd.classList.toggle('visible');
    renderAlerts();
}

async function dismissAlert(alertId) {
    await api('POST', '/api/fleet/alerts/acknowledge', { alert_id: alertId });
    await fetchAll();
    renderHeader();
    renderAlerts();
}

async function deviceAction(deviceId, action) {
    // Record event and attempt to send command
    await api('POST', '/api/fleet/seed-demo'); // Just record the action event for now
    const dev = fleetData.devices.find(d => d.id === deviceId);
    const name = dev?.name || deviceId;

    // Try to send actual command
    try {
        await api('POST', '/api/command', { device_id: deviceId, command: action, params: {} });
    } catch (e) { /* Best effort */ }

    // Record fleet event
    fleetData.events.push({
        id: 'evt-local-' + Date.now(),
        event_type: 'command',
        message: `${action} sent to ${name}`,
        device_id: deviceId,
        severity: action === 'emergency_stop' ? 'critical' : 'info',
        created_at: Date.now() / 1000,
    });
    renderEvents();
}

// Helpers
// ═══════════════════════════════════════

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
}

function getDeviceName(deviceId) {
    const dev = fleetData.devices.find(d => d.id === deviceId);
    return dev?.name || deviceId;
}

// Close alerts dropdown when clicking outside
document.addEventListener('click', (e) => {
    const dd = document.getElementById('alertsDropdown');
    const btn = document.getElementById('alertBtn');
    if (!dd.contains(e.target) && !btn.contains(e.target)) {
        dd.classList.remove('visible');
    }
});

// Main Loop
// ═══════════════════════════════════════

async function init() {
    await seedIfNeeded();
    await fetchAll();

    initCanvas();
    renderHeader();
    renderLocations();
    renderTasks();
    renderEvents();
    drawMap();

    // Poll every 3 seconds
    setInterval(async () => {
        await fetchAll();
        renderHeader();
        renderLocations();
        renderTasks();
        renderEvents();
        if (currentTab === 'map') drawMap();
        if (selectedDeviceId) renderDeviceDetail();
    }, 3000);
}

init();

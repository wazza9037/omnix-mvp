name: OMNIX CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff (lint)
        run: python -m ruff check backend/

      - name: Run ruff (format check)
        run: python -m ruff format --check backend/

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          cd backend && python -m pytest --tb=short -q
        env:
          OMNIX_DB_BACKEND: memory
          OMNIX_LOG_LEVEL: WARNING

      - name: Run stdlib tests (zero-dependency)
        run: python scripts/run_tests.py

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: omnix:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker health check
        run: |
          docker run -d --name omnix-test -p 8765:8765 omnix:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8765/healthz || (docker logs omnix-test && exit 1)
          docker stop omnix-test

# OMNIX Nginx Reverse Proxy Configuration
#
# Features:
#   - HTTP → HTTPS redirect
#   - WebSocket proxying
#   - Gzip compression
#   - Security headers
#   - Static file caching
#
# Usage:
#   1. Place SSL certs in ./certs/ (fullchain.pem, privkey.pem)
#   2. docker-compose --profile nginx up

upstream omnix_http {
    server omnix:8765;
}

upstream omnix_ws {
    server omnix:8766;
}

# HTTP → HTTPS redirect (uncomment when SSL certs are available)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment for HTTPS
    server_name _;

    # SSL configuration (uncomment when certs are available)
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # Uncomment with HTTPS

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Request size limit
    client_max_body_size 20M;

    # Proxy timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Main HTTP API + static files
    location / {
        proxy_pass http://omnix_http;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint
    location /ws {
        proxy_pass http://omnix_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health check (bypass auth)
    location /healthz {
        proxy_pass http://omnix_http/healthz;
        access_log off;
    }

    # Static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://omnix_http;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
